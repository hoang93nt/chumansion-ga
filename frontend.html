<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Gà — Chu Mansion Đà Lạt</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --green:#1b5e42;--gd:#133f2d;--gold:#c9a84c;
  --bg:#f0ede6;--w:#fff;--bd:#ddd9d0;--tx:#1a1a1a;--mu:#888;
  --f:'Be Vietnam Pro',sans-serif;
}

body{
  font-family:var(--f);
  background:var(--bg);
  height:100dvh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* HEADER */
.header{
  background:var(--gd);
  color:white;
  padding:12px 16px;
  display:flex;
  align-items:center;
  gap:10px;
  flex-shrink:0;
}

.hlogo{
  width:38px;height:38px;
  background:var(--gold);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}

.hinfo h1{font-size:14px;font-weight:600;}
.hinfo p{font-size:11px;opacity:.55;margin-top:1px;}

.hdot{
  width:7px;height:7px;
  background:#4ade80;
  border-radius:50%;
  animation:blink 1.8s infinite;
  margin-left:auto;flex-shrink:0;
}

@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* QUICK REPLIES */
.qr-wrap{
  padding:10px 14px 4px;
  display:flex;
  gap:7px;
  flex-wrap:wrap;
  flex-shrink:0;
  background:var(--bg);
}

.qr{
  padding:6px 13px;
  border:1px solid var(--green);
  border-radius:20px;
  font-size:12px;
  color:var(--green);
  background:transparent;
  cursor:pointer;
  font-family:var(--f);
  white-space:nowrap;
  transition:all .15s;
}

.qr:hover{background:var(--green);color:white;}

/* MESSAGES */
.msgs{
  flex:1;
  overflow-y:auto;
  padding:12px 14px;
  display:flex;
  flex-direction:column;
  gap:4px;
  background:var(--bg);
  -webkit-overflow-scrolling:touch;
}

.msgs::-webkit-scrollbar{width:3px;}
.msgs::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px;}

.tsl{
  text-align:center;
  font-size:10px;
  color:#aaa;
  margin:6px 0;
}

.mrow{display:flex;align-items:flex-end;gap:7px;margin:2px 0;}
.mrow.bot{justify-content:flex-start;}
.mrow.user{justify-content:flex-end;}

.mav{
  width:26px;height:26px;
  background:var(--gold);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;flex-shrink:0;
}

.bub{
  max-width:78%;
  padding:9px 13px;
  font-size:14px;
  line-height:1.6;
  white-space:pre-line;
  word-break:break-word;
}

.bub.bot{
  background:var(--w);
  color:var(--tx);
  border-radius:16px 16px 16px 3px;
  border:1px solid var(--bd);
}

.bub.user{
  background:var(--green);
  color:white;
  border-radius:16px 16px 3px 16px;
}

.bub.typing{
  background:var(--w);
  border:1px solid var(--bd);
  border-radius:16px 16px 16px 3px;
  padding:12px 14px;
}

.dots{display:flex;gap:4px;align-items:center;height:14px;}
.dots span{
  width:6px;height:6px;
  background:#bbb;border-radius:50%;
  animation:bounce 1.1s infinite;
}
.dots span:nth-child(2){animation-delay:.18s;}
.dots span:nth-child(3){animation-delay:.36s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* INPUT */
.ibar{
  padding:10px 14px;
  border-top:1px solid var(--bd);
  background:var(--w);
  display:flex;
  gap:8px;
  align-items:flex-end;
  flex-shrink:0;
}

.ibar textarea{
  flex:1;
  border:1px solid var(--bd);
  border-radius:22px;
  padding:10px 16px;
  font-family:var(--f);
  font-size:14px;
  resize:none;
  outline:none;
  max-height:100px;
  min-height:42px;
  line-height:1.5;
  color:var(--tx);
  background:var(--bg);
  transition:border-color .15s;
  -webkit-appearance:none;
}

.ibar textarea:focus{border-color:var(--green);background:white;}

.sbtn{
  width:42px;height:42px;
  background:var(--green);
  border:none;border-radius:50%;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}

.sbtn:hover{background:var(--gd);}
.sbtn:disabled{opacity:.35;cursor:default;}
.sbtn svg{width:16px;height:16px;fill:white;}

/* FOOTER */
.footer{
  text-align:center;
  font-size:10px;
  color:#bbb;
  padding:6px;
  background:var(--bg);
  flex-shrink:0;
}
</style>
</head>
<body>

<div class="header">
  <div class="hlogo">🐔</div>
  <div class="hinfo">
    <h1>Gà — Chu Mansion Đà Lạt</h1>
    <p>Tư vấn đặt phòng · Chill & Grill · Pickleball</p>
  </div>
  <div class="hdot"></div>
</div>

<div class="qr-wrap" id="qrWrap">
  <button class="qr" onclick="sq(this.textContent)">Giá phòng 💰</button>
  <button class="qr" onclick="sq(this.textContent)">Còn phòng không? 🏠</button>
  <button class="qr" onclick="sq(this.textContent)">Check in mấy giờ? ⏰</button>
  <button class="qr" onclick="sq(this.textContent)">Có nhận pet không? 🐶</button>
  <button class="qr" onclick="sq(this.textContent)">Sân Pickleball 🏸</button>
  <button class="qr" onclick="sq(this.textContent)">Đặt phòng ngay 📅</button>
</div>

<div class="msgs" id="msgs">
  <div class="tsl" id="ts0"></div>
  <div class="mrow bot">
    <div class="mav">🐔</div>
    <div class="bub bot">Dạ em nghe ạ

Cho em hỏi mình đi mấy người và cần phòng như thế nào để em check tư vấn cho mình nha 😊</div>
  </div>
</div>

<div class="ibar">
  <textarea id="inp" placeholder="Nhắn tin với Gà..." rows="1"></textarea>
  <button class="sbtn" id="sbtn">
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<div class="footer">Chu Mansion · 231 Phù Đổng Thiên Vương, Đà Lạt · 0798 285 287</div>

<script>
const SYSTEM = `Mày là Gà — nhân viên tư vấn đặt phòng của Chu Mansion Đà Lạt. Mày là con pet của khách sạn, tên Gà, vừa dễ thương vừa chốt đơn cực ngọt.

CÁCH NÓI CHUYỆN — học từ 32 conversations chốt cọc thành công:
- Xưng "em", gọi khách "chị/anh/mình/bạn" — đọc context để chọn
- Cực thân thiện, tự nhiên: "người đẹp ơi", "nha", "nè", "neg", "ạ", "hen", "ù"
- Hay dùng: "Dạ", "Oker lun!", "Oker nè", "E xin sdt nha", "Hong sao hết nghen"
- Ngắn gọn, xuống dòng rõ. Không bullet points. Không formal.
- Viết tắt thoải mái: "dc" = được, "k" = không, "ù" = ừ

THÔNG TIN KHÁCH SẠN:
Tên: Chu Mansion - Chill & Grill and Pickleball
Địa chỉ: 231 Phù Đổng Thiên Vương, P.8, Đà Lạt
Hotline lễ tân: 0798 285 287 | Sale: 0896 404 572
Cách chợ: 2km, 7–10 phút đi xe

GIÁ PHÒNG ngày thường:
- Superior (Sup): 400–500k/đêm
- Deluxe view sân vườn: 500–600k/đêm
- Vip / Tổ chim (bồn tắm gỗ): 800–900k/đêm
- Family (2 giường): 700–1.000k/đêm
- Ngày lễ/cuối tuần: +30–50%
- Đặt trực tiếp LUÔN rẻ hơn Agoda/Booking

TIỆN ÍCH:
- Pickleball: 2h free khi đặt trực tiếp, sau đó 120k/giờ
- Bida: miễn phí | Xe máy: 130–150k/ngày
- Bãi đậu xe ô tô trong sân
- BBQ, trà chiều, nướng khoai buổi tối
- Không có ăn sáng

CHÍNH SÁCH:
- Check in 14h (hỗ trợ sớm nếu có phòng) | Check out 11h30
- Pet: nhận, +200k, ưu tiên Deluxe
- Cọc trước để giữ phòng

QUY TRÌNH CHỐT ĐƠN:
1. Hỏi số người + ngày nếu chưa có
2. Báo giá ngắn: "Dạ deluxe 550 - sup 450 ạ"
3. Khách OK → "E xin sdt chốt bill nha"
4. Gửi bill: Tên - SĐT - In/Out - Phòng × đêm = tổng - Cọc
5. Mời add Zalo 0798285287 để cọc và call video xem phòng
6. Sau chốt: gửi list quán ăn must-try Đà Lạt

SAU KHI CHỐT CỌC — gửi list quán ăn:
"Nhà em có list quán ăn must try gửi mình nha:
Mì nấm · Cà ri Chàaa · Mì quảng cô 6 · Miến trộn đệ nhất
CF: Hana land · Villa D'Hiver · Tiệm cf người thương ơi
Bánh: Blue dream bread · Caneles Đà Lạt
Nhậu: Rụ · The Hot · OM · Túi nướng Lavender"

XỬ LÝ:
- Hết phòng: đề xuất ngày khác hoặc xin SĐT báo sau
- So OTA: "Đặt ở đây rẻ hơn nha, check thử đi"
- Do dự: nhấn mạnh tiện ích, offer giảm thêm
- Huỷ: hỏi lý do, tìm cách giữ khách

QUAN TRỌNG: Mỗi tin PHẢI kết bằng câu hỏi hoặc hành động cụ thể. Xuống dòng giữa các ý.`;

let history = [];
let busy = false;
const msgs = document.getElementById('msgs');
const inp = document.getElementById('inp');
const sbtn = document.getElementById('sbtn');

document.getElementById('ts0').textContent =
  new Date().toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'});

inp.addEventListener('input', function(){
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

inp.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

sbtn.addEventListener('click', send);

function addBubble(text, role) {
  const row = document.createElement('div');
  row.className = `mrow ${role}`;
  if (role === 'bot') {
    const av = document.createElement('div');
    av.className = 'mav';
    av.textContent = '🐔';
    row.appendChild(av);
  }
  const b = document.createElement('div');
  b.className = `bub ${role}`;
  b.textContent = text;
  row.appendChild(b);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'mrow bot';
  row.id = 'typing';
  row.innerHTML = '<div class="mav">🐔</div><div class="bub typing"><div class="dots"><span></span><span></span><span></span></div></div>';
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function send() {
  if (busy) return;
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  inp.style.height = 'auto';
  busy = true;
  sbtn.disabled = true;

  // Ẩn quick replies sau lần nhắn đầu
  document.getElementById('qrWrap').style.display = 'none';

  addBubble(text, 'user');
  history.push({ role: 'user', content: text });
  showTyping();

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history.slice(-20) })
    });
    const data = await res.json();
    removeTyping();
    const reply = data.reply;
    if (reply) {
      history.push({ role: 'assistant', content: reply });
      addBubble(reply, 'bot');
    } else {
      addBubble('Dạ em đang bận xíu\n\nMình nhắn lại sau hoặc gọi hotline 0798 285 287 nha!', 'bot');
    }
  } catch(e) {
    removeTyping();
    addBubble('Dạ em đang gặp sự cố\n\nMình gọi hotline 0798 285 287 để em hỗ trợ trực tiếp nha!', 'bot');
  }

  busy = false;
  sbtn.disabled = false;
  inp.focus();
}

function sq(text) {
  inp.value = text;
  send();
}
</script>
</body>
</html>
